name: SNITCH
version: '${project.version}'
main: dev.lokifisch.snitch.SnitchPlugin
api-version: '1.21'
author: lokifisch
description: Server-side Notifier Inspecting Translation To Catch Hackers. Detects client mods via the MC-265322 sign-translation exploit.
depend:
  - ProtocolLib

commands:
  snitch:
    description: SNITCH admin commands
    usage: /snitch <list|add <mod> <key>|remove <mod> <key>|removemod <mod>|scan [player]|reload|info|update [check]>
    permission: snitch.admin

permissions:
  snitch.admin:
    description: Manage SNITCH and trigger manual scans
    default: op
  snitch.bypass:
    description: Bypass all SNITCH scanning and detection — no probes sent, no actions fired
    default: false
    children:
      snitch.bypass.scan: true
      snitch.bypass.action: true
  snitch.bypass.scan:
    description: Bypass the probe scan (no sign packets sent)
    default: false
  snitch.bypass.action:
    description: Bypass detection actions (probes may still run but no kick/ban fires)
    default: false
