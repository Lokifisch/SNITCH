# ============================================================================
#  SNITCH  -  Server-side Notifier Inspecting Translation To Catch Hackers
# ============================================================================

# Name shown in kick/ban messages (%server% placeholder).
server-name: "My Server"

detection:
  # Ticks to wait after a player joins before scanning (20 ticks = 1 second).
  delay-ticks: 40

  # Re-scan every player on this interval. 0 disables periodic re-scanning.
  rescan-interval-ticks: 0

  # The throwaway sign is placed this many blocks below the player's feet.
  probe-y-offset: -3

  # Ticks between sending the open-editor packet and the close packet.
  close-delay-ticks: 2

  # Ticks after the close packet before the fake block is reverted.
  revert-delay-ticks: 4

  # Active probe sessions older than this (ticks) are discarded.
  session-timeout-ticks: 100

action:
  # What happens at each flag count (per player, per mod).
  # Supported actions: LOG, KICK, BAN
  #   LOG  - print to console only
  #   KICK - disconnect the player
  #   BAN  - kick and add to the server ban list
  # Any flag count not listed here defaults to LOG.
  flags:
    1: KICK
    2: BAN

  # Message sent to the player when kicked. Supports & colour codes.
  # Placeholders: %mod%, %server%
  kick-message: "&cYou have been kicked from &e%server%&c: &f%mod% &cis not allowed."

  # Message sent to the player when banned.
  # Placeholders: %mod%, %server%
  ban-message: "&cYou have been permanently banned from &e%server%&c for using &f%mod%&c."

  # Optional console commands to run on any detection (regardless of flag action).
  # Placeholders: %player%, %mod%, %key%, %evidence%, %flag%, %server%
  commands: []

logging:
  # Print every detection to the server console.
  console: true
  # Print a line for clean players too (useful while tuning).
  log-clean-players: false

# ----------------------------------------------------------------------------
#  MODS TO PROBE
#
#  Each mod entry maps a friendly name to a list of translation keys.
#  The player is flagged as soon as ANY one key resolves.
#  Keys are verified directly from each mod's assets/<modid>/lang/en_us.json.
# ----------------------------------------------------------------------------
mods:
  Freecam:
    - "key.freecam.toggle"
    - "key.freecam.config.open"
    - "key.freecam.controlPlayer.toggle"

  MeteorClient:
    - "key.meteor-client.open-gui"
    - "key.meteor-client.open-commands"
    - "key.category.meteor-client.meteor-client"

  # baritone-meteor has no lang file — cannot be detected via translation keys
